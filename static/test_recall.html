<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语义记忆召回测试</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
    <div id="app" class="max-w-3xl mx-auto bg-white rounded-xl shadow p-6">
        <h1 class="text-2xl font-bold mb-4 text-gray-800">语义记忆召回测试</h1>
        
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-2">输入测试文本：</label>
            <textarea v-model="inputText" rows="3" class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="例如：肚子疼..."></textarea>
        </div>
        
        <button @click="testRecall" :disabled="loading" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg flex items-center mb-6 disabled:opacity-50">
            <span v-if="loading" class="mr-2">
                <svg class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            </span>
            测试召回
        </button>

        <div>
            <h2 class="text-lg font-semibold mb-3 border-b pb-2 text-gray-700">召回结果 (Top 5, 相似度 > 0.5)</h2>
            
            <div v-if="results.length > 0" class="space-y-4">
                <div v-for="(item, index) in results" :key="index" class="bg-gray-50 border border-gray-200 rounded-lg p-4">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-xs font-semibold px-2 py-1 bg-blue-100 text-blue-800 rounded">#{{ index + 1 }}</span>
                        <span class="text-sm font-mono text-gray-500">相似度: <span class="font-bold text-gray-800">{{ item.sim }}</span></span>
                    </div>
                    <p class="text-gray-700 whitespace-pre-wrap">{{ item.content }}</p>
                </div>
            </div>
            <div v-else-if="hasSearched && results.length === 0" class="text-gray-500 italic p-4 bg-gray-50 rounded-lg border border-gray-100 text-center">
                未找到相关记忆。
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref } = Vue;

        createApp({
            setup() {
                const inputText = ref('');
                const loading = ref(false);
                const results = ref([]);
                const hasSearched = ref(false);

                const testRecall = async () => {
                    if (!inputText.value.trim()) return;
                    
                    loading.value = true;
                    hasSearched.value = false;
                    try {
                        const params = new URLSearchParams(window.location.search);
                        const token = params.get('token') || '';
                        const res = await fetch('/admin/api/test-recall?token=' + encodeURIComponent(token), {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ text: inputText.value })
                        });
                        const data = await res.json();
                        if (data.success) {
                            results.value = data.results;
                        } else {
                            alert('错误: ' + data.error);
                        }
                    } catch (e) {
                        alert('网络错误: ' + e.message);
                    } finally {
                        loading.value = false;
                        hasSearched.value = true;
                    }
                };

                return { inputText, loading, results, hasSearched, testRecall };
            }
        }).mount('#app');
    </script>
</body>
</html>
