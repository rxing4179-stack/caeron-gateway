<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>贪吃蛇 - Caeron Gateway</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  html, body {
    width: 100%; height: 100%;
    background: #0a0a0a;
    color: #b8d4d4;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    position: fixed;
    top: 0; left: 0;
  }

  .game-wrapper {
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 12px 8px;
    padding-top: max(12px, env(safe-area-inset-top, 12px));
    padding-bottom: max(12px, env(safe-area-inset-bottom, 12px));
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    max-width: 400px;
    padding: 0 4px;
    flex-shrink: 0;
  }

  .title {
    font-size: 14px;
    color: #5a8a8a;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .score-display {
    font-size: 14px;
    color: #7ab8b8;
  }

  .score-display span {
    color: #a0e0d0;
    font-weight: bold;
  }

  .canvas-wrap {
    position: relative;
    flex-shrink: 1;
    flex-grow: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    min-height: 0;
    margin: 8px 0;
  }

  #gameCanvas {
    border: 1px solid #2a4a4a;
    background: #0d1111;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    box-shadow: 
      0 0 20px rgba(90, 180, 160, 0.05),
      inset 0 0 40px rgba(0, 0, 0, 0.3);
  }

  .info-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    max-width: 400px;
    padding: 0 8px;
    font-size: 12px;
    color: #3a6a6a;
    flex-shrink: 0;
  }

  .overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(10, 10, 10, 0.85);
    z-index: 10;
    pointer-events: auto;
  }

  .overlay.hidden { display: none; }

  .overlay-title {
    font-size: 20px;
    color: #a0e0d0;
    letter-spacing: 4px;
    margin-bottom: 8px;
  }

  .overlay-subtitle {
    font-size: 12px;
    color: #5a8a8a;
    margin-bottom: 24px;
  }

  .overlay-score {
    font-size: 16px;
    color: #7ab8b8;
    margin-bottom: 6px;
  }

  .overlay-high {
    font-size: 12px;
    color: #4a7a7a;
    margin-bottom: 24px;
  }

  .start-hint {
    font-size: 12px;
    color: #5a8a8a;
    animation: blink 1.5s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  .mobile-controls {
    flex-shrink: 0;
    width: 100%;
    max-width: 180px;
    aspect-ratio: 3/3;
    display: grid;
    grid-template-areas:
      ". up ."
      "left . right"
      ". down .";
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: 1fr 1fr 1fr;
    gap: 4px;
  }

  @media (hover: none) and (pointer: coarse) {
    .mobile-controls { display: grid !important; }
  }

  .ctrl-btn {
    background: #1a2a2a;
    border: 1px solid #2a4a4a;
    color: #5a8a8a;
    font-size: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border-radius: 8px;
    transition: background 0.1s;
    -webkit-tap-highlight-color: transparent;
    min-width: 0;
    min-height: 0;
  }

  .ctrl-btn:active {
    background: #2a4a4a;
    color: #a0e0d0;
  }

  .ctrl-btn.up { grid-area: up; }
  .ctrl-btn.down { grid-area: down; }
  .ctrl-btn.left { grid-area: left; }
  .ctrl-btn.right { grid-area: right; }

  /* desktop: hide controls */
  @media (hover: hover) and (pointer: fine) {
    .mobile-controls { display: none !important; }
  }
</style>
</head>
<body>

<div class="game-wrapper">
  <div class="header">
    <div class="title">snake</div>
    <div class="score-display">score <span id="score">0</span></div>
  </div>

  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="gameCanvas"></canvas>
    <div class="overlay" id="overlay">
      <div class="overlay-title" id="overlayTitle">SNAKE</div>
      <div class="overlay-subtitle" id="overlaySubtitle">caeron gateway arcade</div>
      <div class="overlay-score hidden" id="overlayScore"></div>
      <div class="overlay-high hidden" id="overlayHigh"></div>
      <div class="start-hint" id="startHint">tap or press any key</div>
    </div>
  </div>

  <div class="info-bar">
    <div id="lengthInfo">length: 3</div>
    <div id="speedInfo">speed: 1</div>
    <div id="highInfo">best: 0</div>
  </div>

  <div class="mobile-controls" id="mobileControls">
    <button class="ctrl-btn up" data-dir="up">&#8593;</button>
    <button class="ctrl-btn left" data-dir="left">&#8592;</button>
    <button class="ctrl-btn right" data-dir="right">&#8594;</button>
    <button class="ctrl-btn down" data-dir="down">&#8595;</button>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const canvasWrap = document.getElementById('canvasWrap');

// --- responsive sizing ---
const COLS = 20;
const ROWS = 20;
let CELL, canvasSize;

function resize() {
  const wrapRect = canvasWrap.getBoundingClientRect();
  const maxW = wrapRect.width - 16;
  const maxH = wrapRect.height - 16;
  const maxSize = Math.min(maxW, maxH);
  CELL = Math.floor(maxSize / COLS);
  canvasSize = CELL * COLS;
  canvas.width = canvasSize;
  canvas.height = canvasSize;
  canvas.style.width = canvasSize + 'px';
  canvas.style.height = canvasSize + 'px';
  if (snake) draw();
}

window.addEventListener('resize', () => { resize(); });

// --- colors ---
const C = {
  bg:       '#0d1111',
  grid:     '#111818',
  snake:    '#6abfaf',
  snakeH:   '#a0e0d0',
  snakeT:   '#3a8a7a',
  food:     '#e0a070',
  foodGlow: 'rgba(224, 160, 112, 0.15)',
  eye:      '#0d1111',
  trail:    'rgba(90, 180, 160, 0.04)',
};

// --- speed config ---
// Start slow (300ms), speed up as snake grows
const BASE_INTERVAL = 420;   // very slow start — 蕊蕊说太快了
const MIN_INTERVAL = 90;     // fastest possible
const ACCEL_PER_FOOD = 5;    // ms faster per food eaten (gentler curve)

// --- state ---
let snake, dir, nextDir, food, score, highScore, alive, running, speed, trail;
let gameLoop = null;
let currentInterval = BASE_INTERVAL;

highScore = parseInt(localStorage.getItem('snakeHigh') || '0');
document.getElementById('highInfo').textContent = `best: ${highScore}`;

function init() {
  const mid = Math.floor(COLS / 2);
  const midy = Math.floor(ROWS / 2);
  snake = [
    { x: mid, y: midy },
    { x: mid - 1, y: midy },
    { x: mid - 2, y: midy },
  ];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  speed = 1;
  alive = true;
  running = true;
  trail = [];
  currentInterval = BASE_INTERVAL;
  placeFood();
  updateUI();
}

function placeFood() {
  let pos;
  do {
    pos = {
      x: Math.floor(Math.random() * COLS),
      y: Math.floor(Math.random() * ROWS),
    };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('lengthInfo').textContent = `length: ${snake.length}`;
  document.getElementById('speedInfo').textContent = `speed: ${speed}`;
  document.getElementById('highInfo').textContent = `best: ${highScore}`;
}

function tick() {
  if (!alive || !running) return;

  dir = { ...nextDir };
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    die(); return;
  }
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    die(); return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += 10;
    if (score > highScore) {
      highScore = score;
      localStorage.setItem('snakeHigh', highScore);
    }
    // gradual speed up
    currentInterval = Math.max(MIN_INTERVAL, BASE_INTERVAL - (snake.length - 3) * ACCEL_PER_FOOD);
    speed = Math.floor((BASE_INTERVAL - currentInterval) / ACCEL_PER_FOOD) + 1;
    clearInterval(gameLoop);
    gameLoop = setInterval(tick, currentInterval);
    placeFood();
  } else {
    const tail = snake.pop();
    trail.push({ ...tail, alpha: 0.08 });
  }

  trail = trail.filter(t => t.alpha > 0.005);
  trail.forEach(t => t.alpha *= 0.85);

  updateUI();
  draw();
}

function die() {
  alive = false;
  running = false;
  clearInterval(gameLoop);
  gameLoop = null;
  drawDeathFlash();
  setTimeout(() => {
    draw();
    showOverlay(true);
  }, 300);
}

function drawDeathFlash() {
  ctx.fillStyle = 'rgba(224, 100, 80, 0.15)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function draw() {
  ctx.fillStyle = C.bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // subtle grid
  ctx.strokeStyle = C.grid;
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath();
    ctx.moveTo(x * CELL, 0);
    ctx.lineTo(x * CELL, canvas.height);
    ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath();
    ctx.moveTo(0, y * CELL);
    ctx.lineTo(canvas.width, y * CELL);
    ctx.stroke();
  }

  // trail
  trail.forEach(t => {
    ctx.fillStyle = `rgba(90, 180, 160, ${t.alpha})`;
    ctx.fillRect(t.x * CELL + 1, t.y * CELL + 1, CELL - 2, CELL - 2);
  });

  // food glow
  const fx = food.x * CELL + CELL / 2;
  const fy = food.y * CELL + CELL / 2;
  const glow = ctx.createRadialGradient(fx, fy, 2, fx, fy, CELL * 1.8);
  glow.addColorStop(0, C.foodGlow);
  glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow;
  ctx.fillRect(fx - CELL * 2, fy - CELL * 2, CELL * 4, CELL * 4);

  // food
  ctx.fillStyle = C.food;
  const fp = 2;
  ctx.fillRect(food.x * CELL + fp, food.y * CELL + fp, CELL - fp * 2, CELL - fp * 2);
  ctx.fillStyle = 'rgba(255, 200, 150, 0.3)';
  ctx.fillRect(food.x * CELL + fp + 2, food.y * CELL + fp + 2, 4, 4);

  // snake body
  for (let i = snake.length - 1; i >= 0; i--) {
    const s = snake[i];
    const t = i / snake.length;
    
    if (i === 0) {
      ctx.fillStyle = C.snakeH;
      ctx.fillRect(s.x * CELL, s.y * CELL, CELL, CELL);
      
      // eyes
      ctx.fillStyle = C.eye;
      const es = Math.max(2, Math.floor(CELL * 0.18));
      const eo1 = Math.floor(CELL * 0.65);
      const eo2 = Math.floor(CELL * 0.2);
      const eo3 = Math.floor(CELL * 0.65);
      let ex1, ey1, ex2, ey2;
      if (dir.x === 1)       { ex1 = eo1; ey1 = eo2; ex2 = eo1; ey2 = eo3; }
      else if (dir.x === -1) { ex1 = eo2; ey1 = eo2; ex2 = eo2; ey2 = eo3; }
      else if (dir.y === -1) { ex1 = eo2; ey1 = eo2; ex2 = eo3; ey2 = eo2; }
      else                   { ex1 = eo2; ey1 = eo1; ex2 = eo3; ey2 = eo1; }
      ctx.fillRect(s.x * CELL + ex1, s.y * CELL + ey1, es, es);
      ctx.fillRect(s.x * CELL + ex2, s.y * CELL + ey2, es, es);

    } else {
      const r = parseInt(C.snake.slice(1, 3), 16);
      const g = parseInt(C.snake.slice(3, 5), 16);
      const b = parseInt(C.snake.slice(5, 7), 16);
      const factor = 1 - t * 0.4;
      ctx.fillStyle = `rgb(${Math.floor(r*factor)},${Math.floor(g*factor)},${Math.floor(b*factor)})`;
      const gap = 1;
      ctx.fillRect(s.x * CELL + gap, s.y * CELL + gap, CELL - gap * 2, CELL - gap * 2);
    }
  }

  if (!alive) {
    snake.forEach(s => {
      ctx.fillStyle = 'rgba(200, 60, 40, 0.3)';
      ctx.fillRect(s.x * CELL, s.y * CELL, CELL, CELL);
    });
  }
}

function showOverlay(isDeath) {
  const ov = document.getElementById('overlay');
  const title = document.getElementById('overlayTitle');
  const sub = document.getElementById('overlaySubtitle');
  const sc = document.getElementById('overlayScore');
  const hi = document.getElementById('overlayHigh');
  const hint = document.getElementById('startHint');

  if (isDeath) {
    title.textContent = 'GAME OVER';
    sub.textContent = '';
    sc.textContent = `score: ${score}`;
    sc.classList.remove('hidden');
    hi.textContent = `best: ${highScore}`;
    hi.classList.remove('hidden');
    hint.textContent = 'tap or press any key to restart';
  } else {
    title.textContent = 'SNAKE';
    sub.textContent = 'caeron gateway arcade';
    sc.classList.add('hidden');
    hi.classList.add('hidden');
    hint.textContent = 'tap or press any key';
  }
  ov.classList.remove('hidden');
}

function hideOverlay() {
  document.getElementById('overlay').classList.add('hidden');
}

function startGame() {
  hideOverlay();
  init();
  resize();
  draw();
  if (gameLoop) clearInterval(gameLoop);
  gameLoop = setInterval(tick, currentInterval);
}

// --- input ---
function setDir(newDir) {
  if (newDir === 'up'    && dir.y !== 1)  nextDir = { x: 0,  y: -1 };
  if (newDir === 'down'  && dir.y !== -1) nextDir = { x: 0,  y: 1  };
  if (newDir === 'left'  && dir.x !== 1)  nextDir = { x: -1, y: 0  };
  if (newDir === 'right' && dir.x !== -1) nextDir = { x: 1,  y: 0  };
}

document.addEventListener('keydown', e => {
  if (!running) { startGame(); return; }
  const map = {
    ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right',
    w: 'up', s: 'down', a: 'left', d: 'right',
    W: 'up', S: 'down', A: 'left', D: 'right',
  };
  if (map[e.key]) {
    e.preventDefault();
    setDir(map[e.key]);
  }
});

// touch swipe on canvas
let touchStart = null;
canvas.addEventListener('touchstart', e => {
  if (!running) { startGame(); return; }
  const t = e.touches[0];
  touchStart = { x: t.clientX, y: t.clientY };
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  if (!touchStart) return;
  const t = e.touches[0];
  const dx = t.clientX - touchStart.x;
  const dy = t.clientY - touchStart.y;
  const threshold = 15;
  if (Math.abs(dx) > threshold || Math.abs(dy) > threshold) {
    if (Math.abs(dx) > Math.abs(dy)) {
      setDir(dx > 0 ? 'right' : 'left');
    } else {
      setDir(dy > 0 ? 'down' : 'up');
    }
    touchStart = { x: t.clientX, y: t.clientY };
  }
  e.preventDefault();
}, { passive: false });

// overlay
document.getElementById('overlay').addEventListener('click', () => startGame());
document.getElementById('overlay').addEventListener('touchend', e => {
  e.preventDefault();
  startGame();
});

// mobile buttons
document.querySelectorAll('.ctrl-btn').forEach(btn => {
  btn.addEventListener('touchstart', e => {
    e.preventDefault();
    e.stopPropagation();
    if (!running) { startGame(); return; }
    setDir(btn.dataset.dir);
  });
  btn.addEventListener('click', e => {
    e.stopPropagation();
    if (!running) { startGame(); return; }
    setDir(btn.dataset.dir);
  });
});

// --- init ---
resize();
draw();
showOverlay(false);
</script>
</body>
</html>
